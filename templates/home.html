<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GeneScan | Home</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;500;600&display=swap");

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
            color: #e7f3ff;
            background: #041832;
        }

        .hero-shell {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
            background: #031a35;
        }

        .hero-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(2, 17, 38, 0.72) 0%, rgba(2, 17, 38, 0.46) 48%, rgba(2, 17, 38, 0.66) 100%);
            z-index: 1;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            animation: slow-zoom 18s ease-in-out infinite alternate;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(3px);
            z-index: 1;
            opacity: 0.38;
            animation: orb-float 12s ease-in-out infinite alternate;
        }

        .orb-a {
            width: 280px;
            height: 280px;
            right: 17%;
            top: 12%;
            background: radial-gradient(circle at 35% 35%, rgba(113,255,177,0.8), rgba(64,187,255,0.2) 65%, transparent 80%);
        }

        .orb-b {
            width: 220px;
            height: 220px;
            right: 5%;
            bottom: 10%;
            background: radial-gradient(circle at 40% 40%, rgba(122,193,255,0.75), rgba(143,120,255,0.18) 68%, transparent 82%);
            animation-delay: -2.5s;
        }

        .left-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 250px;
            height: 100%;
            background: rgba(4, 22, 45, 0.55);
            border-right: 1px solid rgba(150, 216, 255, 0.22);
            backdrop-filter: blur(4px);
            padding: 1.5rem 1.2rem;
            z-index: 3;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.62rem;
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 2.3rem;
            color: #d6f7ff;
            font-family: "Playfair Display", Georgia, "Times New Roman", serif;
        }

        .logo-dot {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            transform: rotate(45deg);
            background: linear-gradient(135deg, #76ff9b, #35d7ff);
            box-shadow: 0 0 16px rgba(84, 228, 255, 0.85);
        }

        .menu {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 0.6rem;
        }

        .menu a {
            color: #d2e8f7;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.4rem 0.2rem;
            font-size: 1.25rem;
        }

        .menu a:hover { color: #f2fdff; }

        .center-content {
            position: relative;
            margin-left: 250px;
            min-height: 100vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 2rem 2rem 2rem 2.8rem;
            z-index: 3;
        }

        .headline {
            font-family: "Playfair Display", Georgia, "Times New Roman", serif;
            font-size: clamp(2.4rem, 4.2vw, 3.8rem);
            font-weight: 700;
            text-shadow: 0 3px 20px rgba(0, 0, 0, 0.4);
            margin-bottom: 0.7rem;
        }

        .sub {
            color: #c9d7e5;
            font-size: 1.18rem;
            margin-bottom: 1.4rem;
        }

        .btn-start {
            border: 1px solid rgba(163, 255, 190, 0.65);
            border-radius: 999px;
            background: linear-gradient(120deg, rgba(116, 247, 170, 0.18), rgba(96, 208, 255, 0.2));
            color: #e9fff3;
            padding: 0.78rem 1.6rem;
            font-size: 1.35rem;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(122, 250, 191, 0.32);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        @media (max-width: 1100px) {
            .left-panel { width: 200px; }
            .center-content { margin-left: 200px; }
        }

        @media (max-width: 900px) {
            .left-panel { position: static; width: 100%; height: auto; border-right: 0; border-bottom: 1px solid rgba(150,216,255,0.22); }
            .center-content { margin-left: 0; min-height: calc(100vh - 130px); }
        }

        @keyframes slow-zoom {
            0% { transform: scale(1.02) translate3d(0, 0, 0); }
            100% { transform: scale(1.08) translate3d(-1.5%, -1%, 0); }
        }

        @keyframes orb-float {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(22px, -16px, 0); }
        }
    </style>
</head>
<body>
    <section class="hero-shell">
        {% if has_backdrop_video %}
        <video class="hero-bg" autoplay muted loop playsinline>
            <source src="/backdrop-video" type="video/mp4">
        </video>
        {% else %}
        <img class="hero-bg" src="/backdrop-image" alt="Backdrop DNA">
        {% endif %}
        <span class="ambient-orb orb-a"></span>
        <span class="ambient-orb orb-b"></span>
        <aside class="left-panel">
            <div class="brand"><span class="logo-dot"></span> Genetic Risk</div>
            <ul class="menu">
                <li><a href="/start-assessment">Assess Your Risk</a></li>
                <li><a href="/about-us">Explore Genes</a></li>
                <li><a href="/how-it-works">Our Services</a></li>
                <li><a href="/about-us">About Us</a></li>
            </ul>
        </aside>

        <div class="center-content">
            <div>
                <h1 class="headline">Unlock Your Genetic Blueprint</h1>
                <p class="sub">Get deep risk insights from your profile and family history.</p>
                <a class="btn-start" href="/start-assessment">Start Assessment →</a>
            </div>
        </div>

    </section>
</body>
</html>
