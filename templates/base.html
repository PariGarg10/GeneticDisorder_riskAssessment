<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}GeneScan{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Source+Serif+4:wght@400;500;600&display=swap");

        :root {
            --green: #8ef8b6;
            --muted: #a8c5d8;
            --bg: #031a35;
            --line: rgba(152, 219, 255, 0.24);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #e7f3ff;
            font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
            min-height: 100vh;
            letter-spacing: 0.01em;
            display: flex;
            flex-direction: column;
        }

        .top-nav {
            background: rgba(4, 22, 45, 0.68);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(6px);
        }

        .brand {
            font-family: "Playfair Display", Georgia, "Times New Roman", serif;
            color: #d7f5ff;
            font-weight: 700;
            font-size: 2.05rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pulse-logo {
            width: 32px;
            height: 20px;
            position: relative;
        }

        .pulse-logo::before {
            content: "";
            position: absolute;
            inset: 0;
            border-bottom: 3px solid #6ce8ff;
            clip-path: polygon(0 50%, 20% 50%, 32% 8%, 45% 92%, 58% 38%, 76% 38%, 100% 38%, 100% 56%, 72% 56%, 58% 96%, 44% 16%, 30% 66%, 0 66%);
        }

        .btn-green {
            border: 0;
            border-radius: 999px;
            background: linear-gradient(120deg, rgba(116, 247, 170, 0.2), rgba(96, 208, 255, 0.22));
            border: 1px solid rgba(163, 255, 190, 0.65);
            color: #ebfff3;
            font-weight: 600;
            padding: 0.65rem 1.6rem;
            box-shadow: 0 0 18px rgba(122, 250, 191, 0.3);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-green:hover { color: #fff; background: linear-gradient(120deg, rgba(116, 247, 170, 0.28), rgba(96, 208, 255, 0.28)); }

        .nav-link-top {
            color: #cbe8fa;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
        }
        .nav-link-top:hover { color: #f1fcff; }

        .btn-light-pill {
            border-radius: 999px;
            border: 1px solid rgba(152, 219, 255, 0.34);
            background: rgba(4, 26, 51, 0.55);
            color: #d8ecfa;
            padding: 0.62rem 1.5rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .page-card {
            background: rgba(4, 26, 51, 0.55);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 8px 26px rgba(3, 11, 26, 0.32);
            backdrop-filter: blur(4px);
        }

        .page-content {
            flex: 1;
        }

        .section-title {
            font-family: "Playfair Display", Georgia, "Times New Roman", serif;
            color: #e7f6ff;
            font-weight: 700;
        }

        .muted { color: var(--muted); }

        .form-control, .form-select {
            background: rgba(9, 34, 60, 0.78);
            border: 1px solid rgba(152, 219, 255, 0.3);
            color: #ecf8ff;
            border-radius: 12px;
        }
        .form-control::placeholder { color: #9ebacf; }
        .form-control:focus, .form-select:focus {
            background: rgba(9, 34, 60, 0.88);
            border-color: rgba(163, 255, 190, 0.72);
            box-shadow: 0 0 0 0.16rem rgba(122, 250, 191, 0.2);
            color: #ffffff;
        }

        .site-footer {
            margin-top: 0;
            background: linear-gradient(90deg, #082740, #0a304d 60%, #072337);
            color: #dbefff;
            padding: 1.1rem 0;
            font-size: 0.9rem;
            border-top: 1px solid rgba(152, 219, 255, 0.22);
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <header class="top-nav py-3">
        <div class="container-fluid px-4 px-lg-5 d-flex justify-content-between align-items-center">
            <a class="brand" href="/">
                <span class="pulse-logo" aria-hidden="true"></span>
                GeneScan
            </a>
            <div class="d-flex align-items-center gap-3 gap-md-4 flex-wrap justify-content-end">
                <a href="/" class="nav-link-top">Home</a>
                <a href="/about-us" class="nav-link-top">About Us</a>
                <a href="/how-it-works" class="nav-link-top">How It Works</a>
                <a href="/start-assessment" class="btn-green">Start Assessment</a>
            </div>
        </div>
    </header>

    <div class="page-content">
        {% block content %}{% endblock %}
    </div>

    <footer class="site-footer">
        <div class="container-fluid px-4 px-lg-5 d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div class="d-flex align-items-center gap-2">
                <span class="pulse-logo" aria-hidden="true"></span>
                <strong>GeneScan</strong>
            </div>
            <div class="text-end">
                <div>© 2026 GeneScan. For informational purposes only.</div>
                <div>Consult healthcare professionals for medical advice.</div>
            </div>
        </div>
    </footer>
</body>
</html>
