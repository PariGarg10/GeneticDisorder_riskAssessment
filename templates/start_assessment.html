{% extends "base.html" %}
{% block title %}GeneScan | Start Assessment{% endblock %}

{% block head_extra %}
<style>
    .assessment-page {
        padding: 2.4rem 1rem 1.4rem;
    }

    .assessment-card {
        max-width: 1240px;
        margin: 0 auto;
        border-radius: 22px;
        border: 1px solid rgba(152, 219, 255, 0.26);
        background: rgba(4, 26, 51, 0.54);
        box-shadow: 0 12px 34px rgba(3, 11, 26, 0.36);
        padding: 2rem 2rem 1.8rem;
    }

    .assessment-title {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.1rem, 3.2vw, 3rem);
        color: #e9f7ff;
        margin-bottom: 0.25rem;
    }

    .assessment-sub {
        color: #a8c5d8;
        margin-bottom: 1.1rem;
        font-size: 0.95rem;
    }

    .field-label {
        font-size: 0.86rem;
        color: #b8d0df;
        margin-bottom: 0.3rem;
        font-weight: 600;
    }

    .form-control, .form-select {
        min-height: 44px;
        border-radius: 12px;
    }

    .cta-btn {
        margin-top: 0.5rem;
        padding: 0.6rem 1.4rem;
    }

    @media (max-width: 768px) {
        .assessment-card {
            padding: 1.35rem 1rem 1.1rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="assessment-page">
    <div class="assessment-card">
        <h2 class="assessment-title">Start Your Assessment</h2>
        <p class="assessment-sub">Fill in your profile to calculate personalized risk.</p>

        <form action="/predict" method="post" class="row g-3">
            <div class="col-md-3">
                <label class="field-label">Age</label>
                <input type="number" class="form-control" name="age" min="1" max="120" required>
            </div>
            <div class="col-md-3">
                <label class="field-label">Gender</label>
                <select class="form-select" name="gender" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Female</option>
                    <option value="2">Male</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="field-label">BMI</label>
                <input type="number" step="0.1" class="form-control" name="bmi" min="10" max="60" required>
            </div>
            <div class="col-md-3">
                <label class="field-label">Systolic BP</label>
                <input type="number" class="form-control" name="ap_hi" min="60" max="260" required>
            </div>

            <div class="col-md-3">
                <label class="field-label">Diastolic BP</label>
                <input type="number" class="form-control" name="ap_lo" min="40" max="180" required>
            </div>
            <div class="col-md-3">
                <label class="field-label">Cholesterol</label>
                <select class="form-select" name="cholesterol" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Normal</option>
                    <option value="2">Above Normal</option>
                    <option value="3">Well Above Normal</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="field-label">Glucose</label>
                <select class="form-select" name="gluc" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Normal</option>
                    <option value="2">Above Normal</option>
                    <option value="3">Well Above Normal</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="field-label">Smoking</label>
                <select class="form-select" name="smoke" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="field-label">Alcohol Intake</label>
                <select class="form-select" name="alco" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="field-label">Physical Activity</label>
                <select class="form-select" name="active" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Active</option>
                    <option value="0">Sedentary</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="field-label">Family History</label>
                <select class="form-select" name="relatives" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">None</option>
                    <option value="1">One</option>
                    <option value="2">Two or More</option>
                </select>
            </div>

            <div class="col-12">
                <button type="submit" class="btn-green cta-btn">Get Results</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
